<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental ERP | Expense Tracking</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    
</head>
<body>

    <div class="app-container">
        <!-- TOP NAVBAR -->
        <div class="navbar">
            <h2 onclick="go('index.html')">Lab Command</h2>
            <div class="navbar-content">
                <div class="nav-item" onclick="go('index.html')">🏠 Home</div>
                <div class="nav-item" onclick="go('clients.html')">👥 Clients</div>
                <div class="nav-item" onclick="go('orders.html')">📦 Orders</div>
                <div class="nav-item" onclick="go('pickups.html')">🚚 Pickups</div>
                <div class="nav-item" onclick="go('shipments.html')">🚚 Shipments</div>
                <div class="nav-item" onclick="go('accounts.html')">💰 Accounts</div>
                <div class="nav-item active" onclick="go('expenses.html')">💸 Expenses</div>
            </div>
            <div class="navbar-actions">
                <div style="font-size: 0.9rem; color: #64748b;">Secured: <span style="color: #10b981; font-weight: 600;">ADMIN</span></div>
                <button class="exit-btn" onclick="logout()">🚪 Exit</button>
            </div>
        </div>

        <div class="content-wrapper">
            <!-- SIDE PANEL -->
            <div class="side-panel">
                <h4 style="margin-bottom: 15px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Manage Expenses</h4>
                <div class="add-client-form" style="border-top: none; padding-top: 0;">
                    <input id="title" type="text" placeholder="Expense Title">
                    <input id="amount" type="number" placeholder="Amount (₹)">
                    <button class="btn-primary" onclick="addExpense()">Record Expense</button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="header-section">
                    <h1 class="client-title">Financial Outflow / Expenses</h1>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <h3 style="margin-bottom: 20px;">Recent Expenses</h3>
                        <div id="expense-list">
                            <p style="text-align: center; color: var(--text-muted)">Loading...</p>
                        </div>
                    </div>
                    <div class="card" style="border-left: 5px solid var(--danger);">
                        <h3>Monthly Summary</h3>
                        <div id="expense-summary" style="margin-top: 20px;">
                            <div class="stat-card">
                                <div class="stat-label">Total Burn</div>
                                <div class="stat-value" id="total-expense">₹0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadExpenses() {
            const expenses = await getData("/expenses/");
            const list = document.getElementById("expense-list");
            let total = 0;

            list.innerHTML = expenses.length ? expenses.map(e => {
                total += e.amount;
                return `
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding: 10px 0;">
                    <div>
                        <div style="font-weight: 600;">${e.title}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted)">${new Date(e.created_at).toLocaleDateString()}</div>
                    </div>
                    <div style="font-weight: 700; color: var(--danger);">₹${e.amount.toLocaleString()}</div>
                </div>
                `;
            }).join("") : `<p style="text-align: center; color: var(--text-muted)">No expenses recorded.</p>`;

            document.getElementById("total-expense").innerText = "₹" + total.toLocaleString();
        }

        async function addExpense() {
            const title = document.getElementById("title").value;
            const amount = document.getElementById("amount").value;
            if(!title || !amount) return alert("Title and Amount required");

            await postData("/expenses/", { title, amount: parseFloat(amount) });
            document.getElementById("title").value = "";
            document.getElementById("amount").value = "";
            loadExpenses();
        }

        loadExpenses();
    </script>
</body>
</html>
