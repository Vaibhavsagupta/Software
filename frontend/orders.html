<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental ERP | Production & Orders</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    
</head>
<body>

    <div class="app-container">
        <!-- TOP NAVBAR -->
        <div class="navbar">
            <h2 onclick="go('index.html')">Lab Command</h2>
            <div class="navbar-content">
                <div class="nav-item" onclick="go('index.html')">🏠 Home</div>
                <div class="nav-item" onclick="go('clients.html')">👥 Clients</div>
                <div class="nav-item active" onclick="go('orders.html')">📦 Orders</div>
                <div class="nav-item" onclick="go('pickups.html')">🚚 Pickups</div>
                <div class="nav-item" onclick="go('shipments.html')">🚚 Shipments</div>
                <div class="nav-item" onclick="go('accounts.html')">💰 Accounts</div>
                <div class="nav-item" onclick="go('expenses.html')">💸 Expenses</div>
            </div>
            <div class="navbar-actions">
                <div style="font-size: 0.9rem; color: #64748b;">Secured: <span style="color: #10b981; font-weight: 600;">ADMIN</span></div>
                <button class="exit-btn" onclick="logout()">🚪 Exit</button>
            </div>
        </div>

        <div class="content-wrapper">
            <!-- SIDE PANEL -->
            <div class="side-panel">
                <div class="sidebar-nav">
                    <h4 style="margin-bottom: 10px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">🏭 Production Queue</h4>
                    <div class="nav-item" id="nav-order-all" onclick="loadOrders()"><span>🛠️ Master Queue</span></div>
                    <div class="nav-item" id="nav-order-New" onclick="filterOrder('New')"><span>🆕 New Cases</span></div>
                    <div class="nav-item" id="nav-order-Production" onclick="filterOrder('In Production')"><span>⚡ In Production</span></div>
                    <div class="nav-item" id="nav-order-TryIn" onclick="filterOrder('Out for TryIn')"><span>🔬 Out for TryIn</span></div>
                    <div class="nav-item" id="nav-order-Complete" onclick="filterOrder('Complete')"><span>📦 Ready to Ship</span></div>
                    <div class="nav-item" id="nav-order-Overdue" onclick="filterOrder('Overdue')"><span>🚨 Overdue Cases</span></div>

                    <h4 style="margin: 20px 0 10px 0; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">📈 Monitoring</h4>
                    <div class="nav-item" id="nav-calendar" onclick="loadCalendar()"><span>📅 Calendar</span></div>
                    <div class="nav-item" id="nav-summary" onclick="loadSummary()"><span>📊 Status Summary</span></div>
                </div>

                <hr style="opacity: 0.1; margin: 20px 0;">

                <div class="add-client-form">
                    <h4 style="margin-bottom: 10px; color: var(--text-muted);">Quick Console</h4>
                    <input id="client_id_input" type="number" placeholder="Client ID">
                    <input id="note_input" type="text" placeholder="Notes">
                    <button class="btn-primary" style="margin-bottom: 15px;" onclick="createPickup()">Request Pickup</button>
                    
                    <hr style="opacity: 0.1; margin-bottom: 15px;">
                    
                    <input id="order_id_input" type="number" placeholder="Order ID">
                    <select id="status_select" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border);">
                        <option value="In Production">In Production</option>
                        <option value="Out for TryIn">Out for TryIn</option>
                        <option value="Complete">Complete (Final)</option>
                        <option value="Delivered">Mark Delivered</option>
                        <option value="On Hold">Put On Hold</option>
                    </select>
                    <button class="btn-primary" style="background: var(--accent);" onclick="updateStatus()">Update Status</button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="header-section">
                    <h1 class="client-title" id="view-title">Production Summary</h1>
                    <div id="stat-dashboard"></div>
                </div>

                <div id="data-container">
                    <div id="data-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 📊 DASHBOARD SUMMARY
        async function loadSummary() {
            setActiveNavItem("summary");
            const data = await getData("/orders/summary");
            const grid = document.getElementById("data-grid");
            const titleEl = document.getElementById("view-title");
            
            titleEl.innerText = "Operations Dashboard";
            grid.innerHTML = `
                <div class="card" style="grid-column: 1/-1; display: grid; grid-template-columns: repeat(3, 2fr); gap: 20px;">
                    <div class="stat-card" style="border-left-color: var(--primary);">
                        <div class="stat-label">New Cases</div>
                        <div class="stat-value">${data.new}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent);">
                        <div class="stat-label">In Production</div>
                        <div class="stat-value">${data.production}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--warning);">
                        <div class="stat-label">Out for TryIn</div>
                        <div class="stat-value">${data.tryin}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--green);">
                        <div class="stat-label">Complete</div>
                        <div class="stat-value">${data.complete}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--danger);">
                        <div class="stat-label">Overdue</div>
                        <div class="stat-value" style="color: var(--danger)">${data.overdue}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: #64748b;">
                        <div class="stat-label">On Hold</div>
                        <div class="stat-value">${data.hold}</div>
                    </div>
                </div>
            `;
            updateTopStats(data);
        }

        function updateTopStats(data) {
            const container = document.getElementById("stat-dashboard");
            const total = data.new + data.production + data.tryin + data.hold + data.overdue;
            container.innerHTML = `
                <div class="stat-card" style="padding: 10px 20px; min-width: 180px;">
                    <div class="stat-label">Active Workload</div>
                    <div class="stat-value" style="font-size: 1.1rem;">${total} Active Cases</div>
                </div>
            `;
        }

        // 🔍 ADVANCED PICKUP VIEWS (Search & Do Pickups)
        async function loadPickupSearch() {
            renderPickupSearchUI("Ignore", "Search Pickup Requests");
        }

        async function loadPickups() {
            // "Do Pickups" in image shows the same search UI but with "Not Picked Up" status
            renderPickupSearchUI("pending", "Search Pickup Requests");
        }

        async function renderPickupSearchUI(defaultStatus, title) {
            setActiveNavItem(defaultStatus === "pending" ? "pickup-all" : "pickup-search");
            const grid = document.getElementById("data-grid");
            grid.innerHTML = "";
            document.getElementById("view-title").innerText = title;
            
            const clients = await getData("/clients") || [];

            grid.innerHTML = `
                <div style="grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="font-size: 1.1rem; color: var(--text-main);"></h3>
                    <a href="#" onclick="showNewPickupModal()" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 500;">+ New Pickup Request</a>
                </div>

                <div class="card" style="grid-column: 1/-1; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 20px; color: #1e293b;">
                    <!-- Row 1: Basic Filters -->
                    <div style="display: grid; grid-template-columns: 2fr 1fr 1.5fr auto; gap: 15px; margin-bottom: 20px;">
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Search</label>
                            <input id="p-search-query" type="text" placeholder="Pickup ID / Client" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Pickup Status</label>
                            <select id="p-search-status" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore" ${defaultStatus === "Ignore" ? 'selected' : ''}>Ignore</option>
                                <option value="pending" ${defaultStatus === "pending" ? 'selected' : ''}>Not Picked Up</option>
                                <option value="completed">Completed</option>
                                <option value="converted">Converted</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Order created</label>
                            <select id="p-search-order-created" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore">Ignore</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div style="display: flex; align-items: flex-end;">
                            <button onclick="executePickupSearch()" style="background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 1.1rem;">🔄</button>
                        </div>
                    </div>

                    <!-- Row 2: Assignment & Route -->
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;">
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Assigned To Staff</label>
                            <select id="p-search-assigned" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore">Ignore</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Pickup done by</label>
                            <select id="p-search-done-by" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore">Ignore</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Route</label>
                            <select id="p-search-route" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore">Ignore</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Delivery Plan</label>
                            <select id="p-search-plan" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                <option value="Ignore">Ignore</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 3: Date Filters -->
                    <div style="border: 1px solid #cbd5e1; padding: 15px; border-radius: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.5);">
                        <div style="display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.85rem;">
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio" name="p-date-field" value="request_date" checked> Request Date</label>
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio" name="p-date-field" value="scheduled_date"> Scheduled Date</label>
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio" name="p-date-field" value="picked_up_date"> Picked up on Date</label>
                        </div>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <select id="p-search-range-type" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 150px;">
                                <option>Month To Date</option>
                            </select>
                            <input type="date" id="p-search-start" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                            <input type="date" id="p-search-end" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        </div>
                    </div>

                    <!-- Row 4: Client Selection -->
                    <div>
                        <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 5px;">Client</label>
                        <select id="p-search-client" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; background: white;">
                            <option value="">Select a client</option>
                            ${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                    </div>

                    <div style="margin-top: 15px;">
                         <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 5px;">
                            <span style="font-size: 1rem;">📧</span> Email
                         </a>
                    </div>
                </div>

                <div id="pickup-results-container" style="grid-column: 1/-1; margin-top: 20px;">
                </div>
            `;
            
            // Set default dates
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = today.toISOString().split('T')[0];
            document.getElementById("p-search-start").value = firstDay;
            document.getElementById("p-search-end").value = lastDay;

            // Trigger initial search for "Do Pickups"
            if (defaultStatus !== "Ignore") {
                executePickupSearch();
            } else {
                document.getElementById("pickup-results-container").innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-muted); border: 1px dashed #cbd5e1; border-radius: 8px;">
                        No PickupRequest records found for current search criterion.<br>
                        Add a new PickupRequest or broaden your search criterion
                    </div>
                `;
            }
        }

        async function executePickupSearch() {
            const query = document.getElementById("p-search-query").value;
            const status = document.getElementById("p-search-status").value;
            const order_created = document.getElementById("p-search-order-created").value;
            const client_id = document.getElementById("p-search-client").value;
            const date_field = document.querySelector('input[name="p-date-field"]:checked').value;
            const start = document.getElementById("p-search-start").value;
            const end = document.getElementById("p-search-end").value;

            let url = `/orders/pickup?`;
            if (query) url += `search=${query}&`;
            if (status !== "Ignore") url += `status=${status}&`;
            if (order_created !== "Ignore") url += `order_created=${order_created}&`;
            if (client_id) url += `client_id=${client_id}&`;
            url += `date_field=${date_field}&`;
            if (start) url += `start_date=${start}&`;
            if (end) url += `end_date=${end}&`;

            const resultsContainer = document.getElementById("pickup-results-container");
            resultsContainer.innerHTML = `<div style="text-align: center; padding: 20px;"><div class="loading-spinner"></div></div>`;
            
            const data = await getData(url);
            if (!data || data.length === 0) {
                resultsContainer.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-muted); border: 1px dashed #cbd5e1; border-radius: 8px;">
                    No PickupRequest records found for current search criterion.
                </div>`;
            } else {
                renderPickups(data, "Search Results", resultsContainer);
            }
        }

        // 📦 PICKUPS RENDER
        function renderPickups(data, title, targetEl = null) {
            const grid = targetEl || document.getElementById("data-grid");
            if (!targetEl) document.getElementById("view-title").innerText = title;
            grid.innerHTML = "";

            data.forEach(p => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.display = "flex";
                card.style.flexDirection = "column";
                card.style.justifyContent = "space-between";

                let statusBadge = p.status === 'completed' ? 'badge-green' : (p.status === 'converted' ? 'badge-blue' : 'badge-orange');

                card.innerHTML = `
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                            <span style="font-weight: 700; color: var(--primary);">#PK-${p.id}</span>
                            <span class="status-badge ${statusBadge}">${p.status.toUpperCase()}</span>
                        </div>
                        <div style="font-size: 0.95rem; font-weight: 600; margin-bottom: 5px;">
                            ${p.client ? p.client.name : 'Client ID: ' + p.client_id}
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">
                            "${p.note || 'No special instructions'}"
                        </div>
                        
                        ${p.assigned_to ? `
                            <div style="display: flex; gap: 10px; font-size: 0.8rem; margin-bottom: 5px;">
                                <span style="color: var(--text-muted);">👤 Assigned:</span>
                                <span style="font-weight: 600;">${p.assigned_to}</span>
                            </div>
                        ` : ''}
                        
                        ${p.route ? `
                            <div style="display: flex; gap: 10px; font-size: 0.8rem; margin-bottom: 10px;">
                                <span style="color: var(--text-muted);">📍 Route:</span>
                                <span style="font-weight: 600;">${p.route}</span>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.7rem; color: var(--text-muted)">${new Date(p.created_at).toLocaleDateString()}</span>
                        <div style="display: flex; gap: 5px;">
                            ${p.status === "pending" ? `<button class="btn-primary" style="padding: 4px 8px; font-size: 0.7rem;" onclick="completePickup(${p.id})">📍 Arrived</button>` : ''}
                            ${p.status === "completed" ? `<button class="btn-primary" style="padding: 4px 8px; font-size: 0.7rem; background: var(--accent);" onclick="convertPickup(${p.id})">✨ Convert</button>` : ''}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // ➕ ACTIONS
        async function showNewPickupModal() {
            const cid = prompt("Enter Client ID:");
            if (!cid) return;
            const note = prompt("Enter Note (Optional):");
            const assigned = prompt("Assign to Staff (Optional):");
            
            const res = await postData("/orders/pickup", { 
                client_id: parseInt(cid), 
                note: note,
                assigned_to: assigned
            });
            
            if (res.id) {
                alert("Pickup Request Created!");
                executePickupSearch();
            } else {
                alert("Error: " + (res.error || "Unknown error"));
            }
        }

        // 🏭 ORDERS RENDER
        async function loadOrders() {
            setActiveNavItem("order-all");
            const data = await getData("/orders");
            renderOrders(data, "Production Master Queue");
        }

        async function filterOrder(status) {
            setActiveNavItem("order-" + (status.replace(" ", "")));
            const data = await getData(`/orders/status/${status}`);
            renderOrders(data, `${status} Cases`);
        }

        function renderOrders(data, title) {
            const grid = document.getElementById("data-grid");
            document.getElementById("view-title").innerText = title;
            grid.innerHTML = "";

            data.forEach(o => {
                const card = document.createElement("div");
                card.className = "card";

                let statusBadge = "badge-blue";
                if(o.status === 'In Production') statusBadge = "badge-orange";
                if(o.status === 'Out for TryIn') statusBadge = "badge-warning";
                if(o.status === 'Complete') statusBadge = "badge-green";
                if(o.status === 'Overdue') statusBadge = "badge-red";
                if(o.status === 'On Hold') statusBadge = "badge-red";

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                        <span style="font-weight: 700; font-size: 1.1rem;">Order #${o.id}</span>
                        <span class="status-badge ${statusBadge}">${o.status}</span>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;">
                        Client: ${o.client_id} | ${o.note || 'No note'}
                    </div>
                    <div style="display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px;">
                        <span style="font-size: 0.75rem; color: var(--text-muted)">Due: ${new Date(o.due_date).toLocaleDateString()}</span>
                        <button class="btn-primary" style="padding: 4px 10px; font-size: 0.7rem;" onclick="quickSelectOrder(${o.id})">Select</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 📅 CALENDAR VIEW
        async function loadCalendar() {
            setActiveNavItem("calendar");
            const data = await getData("/orders/calendar");
            const grid = document.getElementById("data-grid");
            document.getElementById("view-title").innerText = "Case Deadlines Calendar";
            grid.innerHTML = "";

            data.forEach(o => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div style="background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 8px; text-align: center; min-width: 60px;">
                            <div style="font-size: 0.7rem; text-transform: uppercase;">${new Date(o.date).toLocaleString('default', { month: 'short' })}</div>
                            <div style="font-size: 1.2rem; font-weight: 700;">${new Date(o.date).getDate()}</div>
                        </div>
                        <div>
                            <div style="font-weight: 700;">${o.title}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted)">Phase: ${o.status}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ➕ ACTIONS
        async function createPickup() {
            const cid = document.getElementById("client_id_input").value;
            const note = document.getElementById("note_input").value;
            if(!cid) return alert("Client ID required");
            await postData("/orders/pickup", { client_id: parseInt(cid), note });
            loadPickups();
        }

        async function completePickup(id) {
            await putData(`/orders/pickup/${id}/complete`);
            loadPickups();
        }

        async function convertPickup(id) {
            await postData(`/orders/pickup/${id}/convert`);
            loadOrders();
        }

        async function updateStatus() {
            const oid = document.getElementById("order_id_input").value;
            const stat = document.getElementById("status_select").value;
            if(!oid) return alert("Select an Order");
            
            const result = await putData(`/orders/${oid}/status?status=${stat}`);
            if(result.error) alert(result.error);
            loadOrders();
        }

        // UI HELPERS
        function quickSelectOrder(id) {
            document.getElementById("order_id_input").value = id;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setActiveNavItem(id) {
            document.querySelector(".side-panel").querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            const el = document.getElementById("nav-" + id);
            if(el) el.classList.add("active");
        }

        // INIT
        loadSummary();
        const role = localStorage.getItem("role");
        if(document.getElementById("user-role")) {
            document.getElementById("user-role").innerText = role ? role.toUpperCase() : "ADMIN";
        }
    </script>
</body>
</html>
