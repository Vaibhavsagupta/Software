<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental ERP | Secure Entrance</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-box {
            width: 400px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .login-header h1::before {
            content: "\f05b"; 
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #ef4444;
            font-size: 2rem;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid rgba(0, 0, 0, 0.08);
            padding: 14px 16px;
            border-radius: 12px;
            color: #0f172a;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.05);
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            height: 20px;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            opacity: 0.7;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-box">
        <div class="login-header">
            <h1>Labyx</h1>
            <p>SOHAR DENTAL LABORATORY</p>
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-primary" style="margin-top: 10px;" onclick="handleLogin()">Sign In to Dashboard</button>

        <div id="msg" class="error-msg"></div>

        <div class="login-footer">
            &copy; 2026 Advanced Dental Solutions. High Security Protocol Active.
        </div>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const msg = document.getElementById("msg");

            if (!user || !pass) {
                msg.innerText = "Please fill all fields";
                return;
            }

            try {
                // We use the auth/login endpoint we built in Part 2
                const response = await fetch(`http://127.0.0.1:8000/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (data.access_token) {
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("role", data.role);
                    
                    // Small delay for smooth transition
                    msg.style.color = "var(--accent)";
                    msg.innerText = "Access Granted. Redirecting...";
                    
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 800);
                } else {
                    msg.innerText = data.error || "Invalid Credentials";
                }
            } catch (err) {
                msg.innerText = "Network Error - Bridge Lost";
            }
        }

        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
